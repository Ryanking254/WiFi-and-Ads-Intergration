<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Connection Required</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #f2f2f2, #e6e6e6);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .card {
                background: white;
                padding: 30px;
                width: 90%;
                max-width: 420px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                text-align: center;
            }

            h1 {
                margin-bottom: 10px;
                font-size: 22px;
            }

            p {
                color: #555;
                font-size: 14px;
                line-height: 1.4;
            }

            .btn {
                display: inline-block;
                margin-top: 20px;
                padding: 12px 18px;
                background: #007bff;
                color: white;
                border-radius: 8px;
                text-decoration: none;
                font-weight: bold;
                cursor: pointer;
                transition: 0.2s;
            }

            .btn:hover {
                background: #0056b3;
            }

            .status {
                margin-top: 10px;
                font-size: 12px;
                color: #999;
            }
        </style>

        <script>
            const AD_PORTAL_URL = "https://ryanadsportal.vercel.app";

            function goToPortal() {
                window.location.href = AD_PORTAL_URL;
            }

            function checkInternet() {
                // Basic check
                if (!navigator.onLine) {
                    return false;
                }

                // More reliable check (attempt fetch)
                return fetch("https://www.google.com/favicon.ic", {
                    mode: "no-cors",
                })
                    .then(() => true)
                    .catch(() => false);
            }

            window.onload = async function () {
                const status = document.getElementById("status");

                status.textContent = "Checking connection...";

                const online = await checkInternet();

                if (online) {
                    status.textContent = "Internet detected. Redirecting...";
                    window.location.href = "https://google.com"; // normal route
                } else {
                    status.textContent = "No internet detected.";
                }
            };
        </script>
    </head>

    <body>
        <div class="card">
            <h1>No Internet Connection</h1>

            <p>
                Your connection appears to be inactive.<br /><br />
                To restore free internet access, you may watch sponsored ads.
            </p>

            <div class="btn" onclick="goToPortal()">
                🎬 Watch Ads to Get Free Internet
            </div>

            <div class="status" id="status">Checking connection...</div>
        </div>
    </body>
</html>
