<!doctype html>
<html>
    <head>
        <title>WiFi Access Portal</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            body {
                font-family: Arial;
                text-align: center;
                background: #0f172a;
                color: white;
                padding-top: 80px;
            }
            .box {
                background: #1e293b;
                padding: 20px;
                margin: auto;
                width: 300px;
                border-radius: 10px;
            }
            button {
                padding: 10px;
                width: 100%;
                margin-top: 10px;
                border: none;
                border-radius: 6px;
                background: #22c55e;
                color: white;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>

    <body>
        <div class="box">
            <h2>Welcome</h2>
            <p>Connect to access the internet</p>

            <button onclick="login()">Continue</button>
            <script src="app.js"></script>
        </div>

        <script>
            function login() {
                fetch("http://localhost:5000/authorize", {
                    method: "POST",
                }).then(() => {
                    alert("Access granted!");
                });
            }
        </script>
    </body>
</html>
